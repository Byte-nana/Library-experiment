<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss"></style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>
  <body>
    <main
      class="container min-h-screen flex flex-col items-center justify-center gap-y-4 p-10"
    >
      <button
        type="button"
        class="bg-indigo-500 text-white text-3xl p-5 flex items-center gap-x-3 rounded"
        disabled
      >
        <i class="fa-solid fa-spinner animate-spin"></i>
        Processing...
      </button>

      <span class="relative flex h-12 w-12">
        <span
          class="absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"
        ></span>
        <span
          class="animate-ping relative inline-flex rounded-full h-12 w-12 bg-red-300"
        ></span>
      </span>

      <div class="relative">
        <div class="w-12 h-12 rounded-full bg-yellow-200"></div>
        <div
          class="absolute top-0 w-12 h-12 rounded-full bg-red-300 animate-ping"
        ></div>
      </div>

      <div class="w-48 h-12 bg-gray-300 rounded animate-pulse"></div>
      <div class="w-12 h-12 rounded-full bg-red-300 animate-bounce"></div>
    </main>
  </body>
</html>
