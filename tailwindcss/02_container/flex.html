<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss"></style>
  </head>
  <body>
    <header class="bg-gray-100 p-6 rounded-lg mb-6">
      <nav class="flex justify-between items-center">
        <!-- 좌측: 로고 -->
        <div class="text-2xl font-bold">MyWebsite</div>

        <!-- 중앙: 네비게이션 링크 -->
        <ul class="flex gap-4">
          <li>
            <a href="#" class="text-gray-700 hover:text-gray-900">Home</a>
          </li>
          <li>
            <a href="#" class="text-gray-700 hover:text-gray-900">About</a>
          </li>
          <li>
            <a href="#" class="text-gray-700 hover:text-gray-900">Services</a>
          </li>
          <li>
            <a href="#" class="text-gray-700 hover:text-gray-900">Contact</a>
          </li>
        </ul>

        <!-- 우측: 로그인 버튼 -->
        <div>
          <button
            class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-700"
            type="button"
          >
            Login
          </button>
        </div>
      </nav>
    </header>

    <header class="flex justify-between items-center p-6 bg-gray-100">
      <h1 class="text-2xl font-bold">MyWebsite</h1>
      <nav>
        <ul class="flex gap-4 text-gray-700">
          <li><a href="#" class="hover:text-black">Home</a></li>
          <li><a href="#" class="hover:text-black">About</a></li>
          <li><a href="#" class="hover:text-black">Services</a></li>
          <li><a href="#" class="hover:text-black">Contact</a></li>
        </ul>
      </nav>
      <button
        class="px-4 py-2 rounded-md bg-blue-500 text-white hover:bg-blue-700"
      >
        Login
      </button>
    </header>
  </body>
</html>
