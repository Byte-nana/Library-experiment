<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spacing</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss"></style>
  </head>
  <body>
    <div class="space-y-4">
      <div class="w-32 h-32 bg-blue-600"></div>
      <div class="w-32 h-32 bg-red-300"></div>
      <div class="w-32 h-32 bg-yellow-300"></div>

    <div class="flex space-x-6 mt-4">
      <div class="w-32 h-32 bg-blue-900"></div>
      <div class="w-32 h-32 bg-red-600"></div>
      <div class="w-32 h-32 bg-yellow-700"></div>
    </div>

</html>
